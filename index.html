<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>彩色消方块 Mobile</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <main id="app-shell" class="app-shell" data-layout-mode="portrait" data-overlay-screen="explain">
    <header class="top-hud">
      <div class="hud-copy">
        <p id="hud-subtitle" class="hud-subtitle"></p>
        <h1 id="hud-title" class="hud-title"></h1>
      </div>
      <div class="hud-metrics">
        <div class="hud-pill">
          <span>分数</span>
          <strong id="hud-score">0</strong>
        </div>
        <div class="hud-pill">
          <span>时间</span>
          <strong id="hud-time">0</strong>
        </div>
        <div class="hud-pill">
          <span>盘面</span>
          <strong id="hud-board">18×12</strong>
        </div>
        <button id="audio-toggle" class="hud-audio" type="button">声音 开</button>
      </div>
    </header>

    <section class="stage-shell">
      <div id="stage-frame" class="stage-frame">
        <canvas id="game" aria-label="彩色消方块"></canvas>
        <div id="overlay" class="overlay-layer"></div>
      </div>
    </section>

    <p id="status-bar" class="status-bar"></p>

    <nav id="controls" class="bottom-controls">
      <button type="button" class="control-button" data-control="pause">暂停</button>
      <button type="button" class="control-button" data-control="colorblind">色弱模式</button>
      <button type="button" class="control-button control-button--accent" data-control="restart">重新开始</button>
    </nav>
  </main>

  <script>
    (() => {
      const script = document.createElement("script");
      if (window.location.protocol === "file:") {
        script.defer = true;
        script.src = "./src/app-standalone.js";
      } else {
        script.type = "module";
        script.src = "./src/main.js";
      }
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
